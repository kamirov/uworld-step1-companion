<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">MEN2B features</title>
  <desc id="desc">Schematic showing MEN2B with medullary thyroid carcinoma, pheochromocytoma, mucosal neuromas, and marfanoid habitus, usually without hyperparathyroidism.</desc>
  <rect width="960" height="600" fill="#f8fafc"/>
  <rect x="54" y="54" width="852" height="492" rx="20" fill="#fff" stroke="#1f2937" stroke-width="3"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#1f2937">MEN2B</text>
  <text x="480" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#536171">RET M918T classic high-risk pattern</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="98" y="205" width="210" height="170" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="203" y="260" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">Early aggressive</text>
    <text x="203" y="295" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">MTC</text>
    <rect x="375" y="205" width="210" height="170" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="480" y="277" text-anchor="middle" font-size="24" font-weight="700" fill="#075985">Pheochromocytoma</text>
    <rect x="652" y="205" width="210" height="170" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="757" y="260" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">Mucosal</text>
    <text x="757" y="295" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">neuromas</text>
    <text x="480" y="450" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Marfanoid habitus; usually no hyperparathyroidism</text>
    <text x="480" y="490" text-anchor="middle" font-size="19" fill="#536171">Distinguish from Marfan: no lens dislocation or aortic root disease pattern.</text>
  </g>
</svg>
