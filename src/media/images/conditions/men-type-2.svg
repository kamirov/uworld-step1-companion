<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">MEN type 2 RET pattern</title>
  <desc id="desc">Schematic showing MEN2 as RET gain-of-function with medullary thyroid carcinoma, pheochromocytoma, and subtype-specific features.</desc>
  <rect width="960" height="600" fill="#f8fafc"/>
  <rect x="54" y="54" width="852" height="492" rx="20" fill="#fff" stroke="#1f2937" stroke-width="3"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1f2937">MEN Type 2</text>
  <text x="480" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#536171">RET proto-oncogene gain-of-function</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="118" y="205" width="250" height="190" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
    <text x="243" y="255" text-anchor="middle" font-size="26" font-weight="700" fill="#991b1b">Medullary</text>
    <text x="243" y="288" text-anchor="middle" font-size="26" font-weight="700" fill="#991b1b">thyroid CA</text>
    <text x="243" y="340" text-anchor="middle" font-size="20" fill="#991b1b">calcitonin marker</text>
    <rect x="596" y="205" width="250" height="190" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
    <text x="721" y="270" text-anchor="middle" font-size="26" font-weight="700" fill="#075985">Pheochromocytoma</text>
    <text x="721" y="326" text-anchor="middle" font-size="20" fill="#075985">alpha block first</text>
    <path d="M372 300 H590" stroke="#1f2937" stroke-width="5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <text x="480" y="292" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">RET</text>
    <text x="480" y="458" text-anchor="middle" font-size="21" fill="#374151">MEN2A: plus parathyroid disease</text>
    <text x="480" y="490" text-anchor="middle" font-size="21" fill="#374151">MEN2B: mucosal neuromas + marfanoid habitus</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
