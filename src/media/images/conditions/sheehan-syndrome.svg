<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Sheehan syndrome pathophysiology</title>
  <desc id="desc">Schematic showing postpartum hemorrhage leading to pituitary ischemic necrosis, lactation failure, amenorrhea, and adrenal crisis risk.</desc>
  <rect width="960" height="600" fill="#f8fafc"/>
  <rect x="54" y="54" width="852" height="492" rx="20" fill="#fff" stroke="#1f2937" stroke-width="3"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1f2937">Sheehan Syndrome</text>
  <text x="480" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#536171">Postpartum pituitary infarction after severe hemorrhage</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="102" y="235" width="210" height="110" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="207" y="278" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">Postpartum</text>
    <text x="207" y="311" text-anchor="middle" font-size="24" font-weight="700" fill="#991b1b">hemorrhage</text>
    <rect x="375" y="235" width="210" height="110" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="480" y="278" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">Pituitary</text>
    <text x="480" y="311" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">ischemia</text>
    <rect x="648" y="235" width="210" height="110" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="753" y="278" text-anchor="middle" font-size="24" font-weight="700" fill="#075985">Anterior</text>
    <text x="753" y="311" text-anchor="middle" font-size="24" font-weight="700" fill="#075985">pituitary loss</text>
    <path d="M312 290 H368" stroke="#1f2937" stroke-width="5" marker-end="url(#arrow)"/>
    <path d="M585 290 H641" stroke="#1f2937" stroke-width="5" marker-end="url(#arrow)"/>
    <text x="480" y="432" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Failure to lactate + amenorrhea</text>
    <text x="480" y="468" text-anchor="middle" font-size="19" fill="#536171">Low prolactin, low gonadotropins, possible central adrenal insufficiency</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
