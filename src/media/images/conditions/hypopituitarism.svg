<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Hypopituitarism hormone loss</title>
  <desc id="desc">Schematic showing pituitary failure with low ACTH, TSH, LH/FSH, GH, and prolactin depending on involved axes.</desc>
  <rect width="960" height="600" fill="#f8fafc"/>
  <rect x="54" y="54" width="852" height="492" rx="20" fill="#fff" stroke="#1f2937" stroke-width="3"/>
  <text x="480" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#1f2937">Hypopituitarism</text>
  <text x="480" y="142" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#536171">One or more anterior pituitary axes fail</text>
  <ellipse cx="480" cy="245" rx="150" ry="72" fill="#e0f2fe" stroke="#0284c7" stroke-width="4"/>
  <text x="480" y="253" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#075985">Pituitary</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#374151">
    <text x="165" y="405" text-anchor="middle">ACTH low</text>
    <text x="322" y="455" text-anchor="middle">TSH low</text>
    <text x="480" y="405" text-anchor="middle">LH/FSH low</text>
    <text x="638" y="455" text-anchor="middle">GH low</text>
    <text x="795" y="405" text-anchor="middle">Prolactin low</text>
  </g>
  <g stroke="#1f2937" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M395 305 L185 374"/>
    <path d="M430 315 L330 424"/>
    <path d="M480 320 V372"/>
    <path d="M530 315 L630 424"/>
    <path d="M565 305 L775 374"/>
  </g>
  <text x="480" y="520" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#536171">Replace cortisol before thyroid hormone when central adrenal insufficiency possible.</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
  </defs>
</svg>
