<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="Oligoclonal bands">
  <rect width="480" height="200" fill="#f8fafc"/>
  <text x="240" y="24" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600">CSF oligoclonal bands</text>
  <text x="100" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">Serum IgG</text>
  <rect x="60" y="60" width="80" height="100" fill="#fff" stroke="#cbd5e1"/>
  <rect x="68" y="68" width="64" height="6" fill="#94a3b8"/>
  <text x="240" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">CSF IgG</text>
  <rect x="200" y="60" width="80" height="100" fill="#fff" stroke="#cbd5e1"/>
  <rect x="208" y="72" width="64" height="4" fill="#2563eb"/>
  <rect x="208" y="88" width="64" height="4" fill="#2563eb"/>
  <rect x="208" y="104" width="64" height="4" fill="#2563eb"/>
  <rect x="208" y="120" width="64" height="4" fill="#2563eb"/>
  <text x="380" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11">MS pattern</text>
  <rect x="340" y="60" width="80" height="100" fill="#fff" stroke="#dc2626"/>
  <rect x="348" y="72" width="64" height="4" fill="#dc2626"/>
  <rect x="348" y="88" width="64" height="4" fill="#dc2626"/>
  <rect x="348" y="104" width="64" height="4" fill="#dc2626"/>
  <rect x="348" y="120" width="64" height="4" fill="#dc2626"/>
  <text x="240" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Bands in CSF not in serum = intrathecal IgG synthesis (MS)</text>
</svg>
